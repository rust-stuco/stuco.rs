name: Deploy website

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: website-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo
          fallback: none

      - name: Validate TOML formatting
        run: taplo fmt --check resources/*.toml schedule/*.toml Cargo.toml

      - name: Validate TOML against schemas
        run: taplo check

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-marp-cli

      # Needed to build the lecture slides
      - name: Install marp-cli
        run: bun install -g @marp-team/marp-cli

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      # Needed for wasm-opt
      - name: Install binaryen
        uses: sigoden/install-binary@v1
        with:
          repo: WebAssembly/binaryen
          name: wasm-opt

      # Needed to compile the syllabus
      - name: Install typst
        uses: typst-community/setup-typst@v4

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
            !target/dx/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Dioxus CLI
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI 0.7.2
        run: cargo binstall dioxus-cli@0.7.2 --no-confirm

      - name: Build
        env:
          RAYON_NUM_THREADS: 2
        run: dx build --release

      - name: Upload syllabus artifact
        uses: actions/upload-artifact@v4
        with:
          name: syllabus
          path: target/dx/stuco-rs/release/web/public/syllabus.pdf

      - name: Deploy production website
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy

      - name: Deploy preview website
        id: preview
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.actor != 'dependabot[bot]'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}

      - name: Record preview deployment
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.actor != 'dependabot[bot]'
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.deployment-url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;

            if (!previewUrl) {
              core.setFailed("Wrangler did not return a preview URL.");
              return;
            }

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `preview-pr-${context.issue.number}`,
              description: "Cloudflare preview",
              transient_environment: true,
              production_environment: false,
              auto_merge: false,
              required_contexts: [],
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: "success",
              environment_url: previewUrl,
              description: "Cloudflare preview is ready.",
              auto_inactive: true,
            });
