name: Deploy to GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo
          fallback: none

      - name: Validate TOML formatting
        run: taplo fmt --check resources/*.toml schedule/*.toml Cargo.toml

      - name: Validate TOML against schemas
        run: taplo check

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-marp-cli

      # Needed to build the lecture slides
      - name: Install marp-cli
        run: bun install -g @marp-team/marp-cli

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      # Needed for wasm-opt
      - name: Install binaryen
        uses: sigoden/install-binary@v1
        with:
          repo: WebAssembly/binaryen
          name: wasm-opt

      # Needed to compile the syllabus
      - name: Install typst
        uses: typst-community/setup-typst@v4

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Dioxus CLI
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall dioxus-cli --no-confirm

      - name: Build
        run: dx build --release

      - name: Copy index.html to 404.html
        run: cp target/dx/stuco-rs/release/web/public/index.html target/dx/stuco-rs/release/web/public/404.html

      - name: Upload syllabus artifact
        uses: actions/upload-artifact@v4
        with:
          name: syllabus
          path: target/dx/stuco-rs/release/web/public/syllabus.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/dx/stuco-rs/release/web/public

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
